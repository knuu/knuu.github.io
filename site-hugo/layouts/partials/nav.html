{{ $current := .RelPermalink }}
<nav class="site-nav sm:flex sm:justify-between xl:ml-32 pl-4 items-center">
  <div class="flex pt-4">
    <h1 class="font-semibold text-2xl"><a href="{{ "/" | relURL }}">{{ site.Title }}</a></h1>
    <button id="theme-toggle" type="button" aria-label="Light|Dark" class="text-zinc-700 dark:text-zinc-400 rounded-full focus:outline-none text-sm ml-2 p-1">
      <svg id="theme-toggle-dark-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
      </svg>
      <svg id="theme-toggle-light-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
      </svg>
    </button>
  </div>
  <ul class="site-nav-menu flex flex-wrap lg:mr-24 md:pt-0">
    {{ range sort (where site.RegularPages "Section" "pages") "Weight" "asc" }}
      <li class="mr-4 pt-6">
        <a class="site-nav-link{{ if eq $current .RelPermalink }} is-active{{ end }}" href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{ end }}
    <li class="mr-4 pt-6">
      <a class="site-nav-link{{ if eq $current "/archives.html" }} is-active{{ end }}" href="{{ "/archives.html" | relURL }}">Archive</a>
    </li>
    <li class="mr-4 pt-6">
      <a class="site-nav-link{{ if or (eq $current "/tags.html") (hasPrefix $current "/tag/") }} is-active{{ end }}" href="{{ "/tags.html" | relURL }}">Tags</a>
    </li>
  </ul>
</nav>
